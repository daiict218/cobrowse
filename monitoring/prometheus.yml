global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: cobrowse-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - server:4000             # Docker service name (or host.docker.internal:4000 when running server outside Docker)
        labels:
          service: cobrowse-server

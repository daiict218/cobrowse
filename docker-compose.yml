version: "3.9"

services:
  server:
    build: .
    container_name: cobrowse_server
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://cobrowse:cobrowse_dev@postgres:5432/cobrowse
      DB_SSL: "false"
      CACHE_DRIVER: redis
      REDIS_URL: redis://:cobrowse_dev@redis:6379
      ABLY_API_KEY: ${ABLY_API_KEY}
      TOKEN_SECRET: ${TOKEN_SECRET}
      METRICS_ENABLED: "true"
      CORS_ALLOW_ALL: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    container_name: cobrowse_postgres
    environment:
      POSTGRES_USER: cobrowse
      POSTGRES_PASSWORD: cobrowse_dev
      POSTGRES_DB: cobrowse
    ports:
      - "127.0.0.1:5432:5432"   # bind to localhost only — not exposed to network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cobrowse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cobrowse_redis
    command: redis-server --requirepass cobrowse_dev   # require authentication
    ports:
      - "127.0.0.1:6379:6379"   # bind to localhost only — not exposed to network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cobrowse_dev", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cobrowse_prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: cobrowse_grafana
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: cobrowse_dev
    volumes:
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

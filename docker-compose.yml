version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cobrowse_postgres
    environment:
      POSTGRES_USER: cobrowse
      POSTGRES_PASSWORD: cobrowse_dev
      POSTGRES_DB: cobrowse
    ports:
      - "127.0.0.1:5432:5432"   # bind to localhost only — not exposed to network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cobrowse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cobrowse_redis
    command: redis-server --requirepass cobrowse_dev   # require authentication
    ports:
      - "127.0.0.1:6379:6379"   # bind to localhost only — not exposed to network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cobrowse_dev", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

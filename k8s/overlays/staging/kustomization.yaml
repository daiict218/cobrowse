apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cobrowse-staging

namePrefix: staging-

resources:
  - ../../base

patches:
  # Scale down for staging: 1 replica, lower resource limits
  - target:
      kind: Deployment
      name: cobrowse-server
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi

  # HPA: 1-3 replicas in staging
  - target:
      kind: HorizontalPodAutoscaler
      name: cobrowse-server
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # Ingress: staging hostname
  - target:
      kind: Ingress
      name: cobrowse-server
    patch: |
      - op: replace
        path: /spec/tls/0/hosts/0
        value: cobrowse-staging.example.com
      - op: replace
        path: /spec/rules/0/host
        value: cobrowse-staging.example.com
      - op: replace
        path: /spec/tls/0/secretName
        value: cobrowse-staging-tls

  # ConfigMap: staging-specific overrides
  - target:
      kind: ConfigMap
      name: cobrowse-config
    patch: |
      - op: replace
        path: /data/LOG_LEVEL
        value: debug

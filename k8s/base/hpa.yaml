# Horizontal Pod Autoscaler — scales cobrowse-server from 2 to 10 replicas
# based on CPU and memory utilization.
#
# Behavior tuning:
#   - Scale up aggressively (100% pods or 4 pods per 60s)
#   - Scale down conservatively (stabilization window 300s, max 1 pod per 60s)
#   This prevents flapping during bursty co-browse traffic.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cobrowse-server
  namespace: cobrowse
  labels:
    app.kubernetes.io/name: cobrowse-server
    app.kubernetes.io/part-of: cobrowse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cobrowse-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min

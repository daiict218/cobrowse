apiVersion: v1
kind: ServiceAccount
metadata:
  name: cobrowse-server
  namespace: cobrowse
  labels:
    app.kubernetes.io/name: cobrowse-server
    app.kubernetes.io/part-of: cobrowse
  annotations:
    # For AWS IRSA (IAM Roles for Service Accounts) — allows the pod to
    # access S3 for session recordings without long-lived credentials.
    # Replace with your actual IAM role ARN:
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/cobrowse-server

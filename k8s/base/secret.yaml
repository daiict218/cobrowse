# Template for secrets — values MUST be replaced before applying.
# In production, use a sealed-secrets controller, external-secrets operator,
# or inject via CI/CD pipeline. Never commit real values.
#
# To create from literal values:
#   kubectl create secret generic cobrowse-secrets -n cobrowse \
#     --from-literal=DATABASE_URL='postgresql://...' \
#     --from-literal=REDIS_URL='redis://:password@redis:6379' \
#     --from-literal=ABLY_API_KEY='...' \
#     --from-literal=TOKEN_SECRET='...' \
#     --from-literal=RECORDING_S3_BUCKET='...'
apiVersion: v1
kind: Secret
metadata:
  name: cobrowse-secrets
  namespace: cobrowse
  labels:
    app.kubernetes.io/name: cobrowse-server
    app.kubernetes.io/part-of: cobrowse
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"
  REDIS_URL: "REPLACE_ME"
  ABLY_API_KEY: "REPLACE_ME"
  TOKEN_SECRET: "REPLACE_ME"
  RECORDING_S3_BUCKET: "REPLACE_ME"
